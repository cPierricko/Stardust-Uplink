name: Deploy Rogue One OS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build du Frontend (Dashboard)
      - name: Install & Build Client
        run: |
          cd client
          npm install
          npm run build
          cd ..

      # 2. Préparation de la clé SSH
      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > private_key
          chmod 600 private_key

      # 3. RSYNC : Note bien le / après server pour copier le CONTENU
      - name: Rsync to VPS
        run: |
          rsync -avz -e "ssh -i private_key -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude 'storage' \
            --exclude 'db.sqlite' \
            ./server/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/

      # 4. RESTART : On lance depuis la racine de VPS_PATH
      - name: Restart Server via SSH
        run: |
          ssh -i private_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ${{ secrets.VPS_PATH }}
            npm install --omit=dev
            # On lance index.js qui est maintenant directement à la racine
            pm2 restart rogue-one || pm2 start index.js --name "rogue-one"
            pm2 save
          EOF