name: Deploy Rogue One OS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build Client
      - name: Install & Build Client
        run: |
          cd client
          npm install
          npm run build
          cd ..

      # 2. Build & Test Server
      - name: Install, Build & Test Server
        run: |
          cd server
          npm install
          npm run build
          npm run test
          cd ..

      # 3. Setup SSH
      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > private_key
          chmod 600 private_key

      # 4. Rsync Server (including dist/)
      - name: Rsync Server Files
        run: |
          rsync -avz -e "ssh -i private_key -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude 'storage' \
            --exclude 'db.sqlite' \
            --exclude '.git' \
            ./server/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/

      # 5. Rsync Client Build
      - name: Rsync Client Build
        run: |
          ssh -i private_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ${{ secrets.VPS_PATH }}/client/dist"
          rsync -avz -e "ssh -i private_key -o StrictHostKeyChecking=no" \
            ./client/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/client/dist/

      # 6. Restart Server
      - name: Restart Server via SSH
        run: |
          ssh -i private_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ${{ secrets.VPS_PATH }}
            npm install --production
            # Supprimer l'ancien index.js à la racine pour éviter les conflits ESM
            rm -f index.js 
            pm2 restart rogue-one || pm2 start dist/server/index.js --name rogue-one
          EOF