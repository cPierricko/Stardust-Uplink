name: Deploy Rogue One OS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build Client
      - name: Install & Build Client
        run: |
          cd client
          npm install
          npm run build
          cd ..

      # 2. Install & Test Server
      - name: Install & Test Server
        run: |
          cd server
          npm install
          npm run type-check
          npm run test
          cd ..

      # 3. Setup SSH
      - name: Setup SSH
        run: |
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > private_key
          chmod 600 private_key

      # 3. Rsync Server Files (Source Only)
      # On exclut ce qui est géré sur le serveur ou inutile en prod
      - name: Rsync Server Files
        run: |
          rsync -avz -e "ssh -i private_key -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude 'storage' \
            --exclude 'db.sqlite' \
            --exclude '.git' \
            --exclude 'dist' \
            --exclude 'tests' \
            --exclude 'shards_storage' \
            ./server/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/

      # 4. Rsync Client Build
      - name: Rsync Client Build
        run: |
          ssh -i private_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ${{ secrets.VPS_PATH }}/client/dist"
          rsync -avz -e "ssh -i private_key -o StrictHostKeyChecking=no" \
            ./client/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/client/dist/

      # 5. Production Restart
      - name: Production Restart
        run: |
          ssh -i private_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ${{ secrets.VPS_PATH }}
            
            # Installation des dépendances (tsx est dans dependencies)
            npm install --production
            
            # Redémarrage avec PM2 en utilisant la commande 'npm start'
            # (qui lance 'tsx index.ts' via package.json)
            pm2 delete rogue-one || true
            NODE_ENV=production pm2 start "npm start" --name rogue-one
            pm2 save
          EOF